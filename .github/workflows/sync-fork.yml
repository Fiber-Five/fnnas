name: Sync Fork

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Sync upstream changes
        uses: tgymnich/fork-sync@v1.8
        continue-on-error: true  # ← 添加这一行，允许步骤失败
        id: sync
        with:
          owner: ophub
          base: main
          head: main
      
      - name: Check sync result
        run: |
          if [ "${{ steps.sync.outcome }}" == "failure" ]; then
            echo "ℹ️ 没有新的提交需要同步，仓库已是最新状态"
          else
            echo "✅ 同步成功完成"
          fi
